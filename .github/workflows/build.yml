name: 毎日のリンク集を生成

on:
  workflow_dispatch:
  schedule:
    # JST 06:30 は UTC 21:30
    - cron: "30 21 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: リンク集HTMLを生成
        run: python scripts/generate_links.py

      - name: Pagesを設定
        uses: actions/configure-pages@v5

      - name: Pages用アーティファクトをアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: GitHub Pagesへデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
